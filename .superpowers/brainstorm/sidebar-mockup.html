<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sidebar Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; }

  .sidebar {
    width: 260px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
  }

  .sidebar-title {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 8px;
    padding-left: 8px;
  }

  .course-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    transform: scale(1);
    position: relative;
  }

  .course-item:hover {
    transform: scale(1.04);
    border-color: #3b82f640;
    background: #1a2744;
    box-shadow: 0 2px 12px rgba(59, 130, 246, 0.1);
  }

  .course-item.active {
    transform: scale(1.07);
    border-color: #3b82f6;
    background: #1e3a5f;
    box-shadow: 0 4px 20px rgba(59, 130, 246, 0.25), 0 0 0 1px rgba(59, 130, 246, 0.1);
  }

  .course-item.active .course-name {
    color: #fff;
    font-weight: 600;
  }

  .course-item.active .accent-bar {
    opacity: 1;
  }

  .accent-bar {
    position: absolute;
    left: -1px;
    top: 20%;
    bottom: 20%;
    width: 3px;
    border-radius: 0 3px 3px 0;
    background: #3b82f6;
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  /* Progress ring */
  .ring-container {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }
  .ring-container svg { width: 28px; height: 28px; }
  .ring-bg { fill: none; stroke: #2a3a5c; stroke-width: 3; }
  .ring-fg { fill: none; stroke-width: 3; stroke-linecap: round;
    transform: rotate(-90deg); transform-origin: center;
    transition: stroke-dashoffset 0.4s ease, stroke 0.3s ease; }
  .ring-complete { stroke: #22c55e; }
  .ring-active { stroke: #3b82f6; }
  .ring-started { stroke: #f59e0b; }
  .ring-none { stroke: #2a3a5c; }

  .course-info { flex: 1; min-width: 0; }
  .course-name {
    font-size: 13px;
    color: #c0c0c0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s ease, font-weight 0.2s ease;
  }
  .course-progress {
    font-size: 10px;
    color: #666;
    margin-top: 2px;
  }

  /* Main content placeholder */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .main-inner {
    text-align: center;
    color: #555;
  }
  .main-inner h2 { font-size: 18px; margin-bottom: 8px; color: #888; }
  .main-inner p { font-size: 13px; }

  .label {
    display: inline-block;
    background: #3b82f620;
    color: #3b82f6;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: auto;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-title">Courses</div>

  <div class="course-item" onclick="selectCourse(this)" data-progress="9/9">
    <div class="accent-bar"></div>
    <div class="ring-container"></div>
    <div class="course-info">
      <div class="course-name">1. Introduction</div>
      <div class="course-progress">Complete</div>
    </div>
  </div>

  <div class="course-item" onclick="selectCourse(this)" data-progress="7/9">
    <div class="accent-bar"></div>
    <div class="ring-container"></div>
    <div class="course-info">
      <div class="course-name">2. Processes</div>
      <div class="course-progress">7 / 9</div>
    </div>
  </div>

  <div class="course-item active" onclick="selectCourse(this)" data-progress="3/8">
    <div class="accent-bar"></div>
    <div class="ring-container"></div>
    <div class="course-info">
      <div class="course-name">3. Threads</div>
      <div class="course-progress">3 / 8</div>
    </div>
  </div>

  <div class="course-item" onclick="selectCourse(this)" data-progress="0/7">
    <div class="accent-bar"></div>
    <div class="ring-container"></div>
    <div class="course-info">
      <div class="course-name">4. CPU Scheduling</div>
      <div class="course-progress">0 / 7</div>
    </div>
  </div>

  <div class="course-item" onclick="selectCourse(this)" data-progress="0/6">
    <div class="accent-bar"></div>
    <div class="ring-container"></div>
    <div class="course-info">
      <div class="course-name">5. Synchronization</div>
      <div class="course-progress">0 / 6</div>
    </div>
  </div>

  <div class="course-item" onclick="selectCourse(this)" data-progress="0/8">
    <div class="accent-bar"></div>
    <div class="ring-container"></div>
    <div class="course-info">
      <div class="course-name">6. Deadlocks</div>
      <div class="course-progress">0 / 8</div>
    </div>
  </div>

  <div class="course-item" onclick="selectCourse(this)" data-progress="5/5">
    <div class="accent-bar"></div>
    <div class="ring-container"></div>
    <div class="course-info">
      <div class="course-name">7. Memory</div>
      <div class="course-progress">Complete</div>
    </div>
  </div>

  <div class="course-item" onclick="selectCourse(this)" data-progress="2/10">
    <div class="accent-bar"></div>
    <div class="ring-container"></div>
    <div class="course-info">
      <div class="course-name">8. Virtual Memory</div>
      <div class="course-progress">2 / 10</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="main-inner">
    <h2>Click a course in the sidebar</h2>
    <p>Notice the scale, border, and hover animations</p>
  </div>
</div>

<script>
  // Draw progress rings
  const items = document.querySelectorAll('.course-item');
  items.forEach(item => {
    const [done, total] = item.dataset.progress.split('/').map(Number);
    const pct = total > 0 ? done / total : 0;
    const r = 11;
    const circ = 2 * Math.PI * r;
    const offset = circ * (1 - pct);

    let colorClass = 'ring-none';
    if (done >= total && total > 0) colorClass = 'ring-complete';
    else if (item.classList.contains('active')) colorClass = 'ring-active';
    else if (done > 0) colorClass = 'ring-started';

    item.querySelector('.ring-container').innerHTML = `
      <svg viewBox="0 0 28 28">
        <circle class="ring-bg" cx="14" cy="14" r="${r}" />
        <circle class="ring-fg ${colorClass}" cx="14" cy="14" r="${r}"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" />
      </svg>`;
  });

  function selectCourse(el) {
    document.querySelectorAll('.course-item').forEach(i => {
      i.classList.remove('active');
      // Update ring color
      const [done, total] = i.dataset.progress.split('/').map(Number);
      const fg = i.querySelector('.ring-fg');
      if (fg) {
        fg.classList.remove('ring-active');
        if (done >= total && total > 0) fg.className = 'ring-fg ring-complete';
        else if (done > 0) fg.className = 'ring-fg ring-started';
        else fg.className = 'ring-fg ring-none';
      }
    });
    el.classList.add('active');
    // Set active ring color
    const fg = el.querySelector('.ring-fg');
    const [done, total] = el.dataset.progress.split('/').map(Number);
    if (done < total) fg.className = 'ring-fg ring-active';
  }
</script>

</body>
</html>
