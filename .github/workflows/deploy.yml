name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github.event.deployment.payload.web_url || steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      # Mechanical gate: schema, bilingual, lint-site (advisory). Runs before
      # build because schema breaks should fail fast, before paying bundle cost.
      - run: npm run validate

      - run: npm run build

      # Smoke gate: walk every registry route in headless Chrome and fail the
      # deploy if any page hits the ErrorBoundary or throws. Catches bad JSON /
      # unknown block types before they white-screen the live site.
      - run: npm run smoke

      # Note: a content-truth gate (LLM second-grader for MC answer keys) was
      # tried in 2026-04-27 but pulled per council 1777313729 — advisory +
      # same-model-family + silently-skipped-without-secret was strictly worse
      # than absence (laundered confidence). Run `npm run content-truth -- --all`
      # locally for manual audits. Re-add to CI only with a real secret + a
      # strict, blocking config + an out-of-family verifier.

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
