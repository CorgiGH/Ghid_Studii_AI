<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting…</title>
    <script>
      // Single-page-app redirect for GitHub Pages.
      // Pattern: rafgraf/spa-github-pages. GH Pages serves this file for any
      // path it can't resolve; we encode the real path into a query string and
      // bounce to /Ghid_Studii_AI/?/<path> — index.html decodes it back into
      // pushState before BrowserRouter mounts. pathSegmentsToKeep matches the
      // base path depth (1 for /Ghid_Studii_AI/).
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
